# ============================================================
# STARBOUNDSGRP — Netlify Deployment Configuration
# ============================================================

[build]
  command = "npm ci && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Single-page app: every route serves index.html so the React
# router (and Supabase OAuth callback hash params) work correctly.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security headers — good defaults for production.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"
